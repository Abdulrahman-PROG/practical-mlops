name: CI - Flask Container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: make install

      - name: Format check
        run: black --check *.py

      - name: Lint
        run: make lint

      - name: Train model
        run: make train

      - name: Test
        run: make test

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t iris-flask-cd .

      - name: Check container starts and health endpoint responds
        run: |
          docker run -d -p 5000:5000 --name iris-test iris-flask-cd
          sleep 5
          curl --fail http://localhost:5000/health
          docker stop iris-test
